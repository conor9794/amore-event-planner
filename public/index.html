<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Amore Event Planner</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <div class="topBar">
        <div>
          <div class="eyebrow">Amore</div>
          <h1>Event Planner</h1>
        </div>
        <button type="button" id="themeToggle" class="themeToggle" aria-label="Toggle dark mode">Dark</button>
      </div>
      <p>Create events, publish them to the rep portal, and assign ambassadors from one mobile page.</p>
    </header>

    <nav class="tabs" aria-label="Planner pages">
      <button type="button" id="addEventTab" class="tab active">Add Event</button>
      <button type="button" id="assignTab" class="tab">Assign Ambassador</button>
    </nav>

    <section id="addEventPage" class="page active">
      <section class="card">
        <form id="eventForm">
          <label>
            Brand
            <select id="brand" required>
              <option value="">Loading brands...</option>
            </select>
          </label>

          <label>
            Store
            <input id="storeSearch" type="text" placeholder="Start typing store name..." required />
          </label>

          <div id="selectedStore" class="storeBox hidden"></div>

          <div class="grid2">
            <label>
              Event Date
              <input id="eventDate" type="date" required />
            </label>

            <label>
              Event Area
              <select id="eventArea" required>
                <option value="">Select area...</option>
                <option value="Long Island">Long Island</option>
                <option value="NYC">NYC</option>
                <option value="NY North Metro">NY North Metro</option>
                <option value="NJ">NJ</option>
                <option value="CT">CT</option>
                <option value="Upstate NY">Upstate NY</option>
                <option value="MD">MD</option>
                <option value="DC">DC</option>
                <option value="MA">MA</option>
                <option value="FL">FL</option>
              </select>
            </label>
          </div>

          <div class="grid2">
            <label>
              Start Time
              <input id="startTime" type="time" required />
            </label>

            <label>
              End Time
              <input id="endTime" type="time" required />
            </label>
          </div>

          <label>
            Hourly Rate
            <input id="hourlyRate" type="text" placeholder="Enter rate..." required />
          </label>

          <label>
            Details / Notes
            <textarea id="details" rows="4" placeholder="Optional event notes..."></textarea>
          </label>

          <div id="message" class="message hidden"></div>

          <div class="actions">
            <button type="button" id="draftBtn" class="secondary">Save as Draft</button>
            <button type="button" id="publishBtn" class="primary">Publish to Rep Portal</button>
          </div>
        </form>
      </section>
    </section>

    <section id="assignPage" class="page">
      <section class="card">
        <div class="sectionIntro">
          <h2>Assign Ambassador</h2>
          <p>Create a Booking record for an event. This also checks Send Save the Date by default.</p>
        </div>

        <label class="searchLabel">
          Search Event
          <input id="eventSearch" type="text" placeholder="Type brand, store, date, or event name..." autocomplete="off" />
          <div id="eventResults" class="searchResults hidden"></div>
        </label>

        <select id="assignEvent" class="hidden" aria-label="Selected event">
          <option value="">Select event...</option>
        </select>

        <div id="selectedEventBox" class="selectedBox hidden"></div>

        <div id="eventDetails" class="detailBox hidden"></div>

        <div id="bookedBox" class="detailBox hidden">
          <div class="boxTitle">Already Booked</div>
          <div id="bookedList" class="smallList"></div>
        </div>

        <div id="interestBox" class="detailBox hidden">
          <div class="boxTitle">Interested Ambassadors</div>
          <div class="boxHint">Tap a name to select that ambassador.</div>
          <div id="interestList" class="smallList"></div>
        </div>

        <label class="searchLabel">
          Search Ambassador
          <input id="ambassadorSearch" type="text" placeholder="Type name or email..." autocomplete="off" />
          <div id="ambassadorResults" class="searchResults hidden"></div>
        </label>

        <select id="assignAmbassador" class="hidden" aria-label="Selected ambassador">
          <option value="">Select ambassador...</option>
        </select>

        <div id="selectedAmbassadorBox" class="selectedBox hidden"></div>

        <label class="checkboxRow">
          <input id="sendSaveTheDate" type="checkbox" checked />
          <span>Send Save the Date after creating booking</span>
        </label>

        <div id="assignMessage" class="message hidden"></div>

        <div class="actions oneButton">
          <button type="button" id="createBookingBtn" class="primary">Create Booking</button>
        </div>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
